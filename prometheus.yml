global:
  scrape_interval: 10s

scrape_configs:

  - job_name: "prometheus-server"
    static_configs:
      - targets:
          - localhost:9090

  - job_name: "linux-vm"
    static_configs:
      - targets:
          - 192.168.179.136:9100

  - job_name: "aws-ec2"
    static_configs:
      - targets:
          - 3.88.105.246:9100

  - job_name: "flask-metrics-app"
    metrics_path: /metrics
    static_configs:
      - targets:
          - 3.88.105.246:5000
